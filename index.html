                                                ))}
                                            </div>
                                            <div style={{ display: 'flex', flexWrap: 'nowrap', gap: 6, overflow: 'hidden', justifyContent: 'center' }}>
                                                {K_ORDER.map((c, i) => (
                                                    <SelectionCard key={`k-${c}-${i}`} value={c} onClick={() => handleCardClick(c, 1)} colorScheme="pink" small selected={drops[1] === c} />
                                                ))}
                                            </div>
                                        </div>
                                    ) : p.type === 'digit' ? (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 20, width: '100%', alignItems: 'center' }}>
                                            {/* 1~9: 십의 자리 */}
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                                                <div style={{
                                                    fontSize: 24, fontWeight: 900,
                                                    color: '#6b21a8', background: '#f3e8ff',
                                                    padding: '8px 20px', borderRadius: 16,
                                                    border: '3px solid #d8b4fe',
                                                    whiteSpace: 'nowrap', width: 130, textAlign: 'center'
                                                }}>십의 자리</div>
                                                <div style={{ display: 'flex', flexWrap: 'nowrap', gap: 10, justifyContent: 'center' }}>
                                                    {["1", "2", "3", "4", "5", "6", "7", "8", "9"].map(d => (
                                                        <SelectionCard key={`t-${d}`} value={d} onClick={() => handleCardClick(d, 0)} colorScheme="purple" small selected={drops[0] === d} />
                                                    ))}
                                                </div>
                                            </div>
                                            {/* 0~9: 일의 자리 */}
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                                                <div style={{
                                                    fontSize: 24, fontWeight: 900,
                                                    color: '#854d0e', background: '#fff7ed',
                                                    padding: '8px 20px', borderRadius: 16,
                                                    border: '3px solid #fed7aa',
                                                    whiteSpace: 'nowrap', width: 130, textAlign: 'center'
                                                }}>일의 자리</div>
                                                <div style={{ display: 'flex', flexWrap: 'nowrap', gap: 10, justifyContent: 'center' }}>
                                                    {ALL_DIGITS.map(d => (
                                                        <SelectionCard key={`u-${d}`} value={d} onClick={() => handleCardClick(d, 1)} colorScheme="orange" small selected={drops[1] === d} />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 24, justifyContent: 'center' }}>
                                            {cards.map((c, i) => (
                                                <SelectionCard key={`${c}-${i}`} value={c} onClick={handleCardClick} colorScheme="yellow" />
                                            ))}
                                        </div>
                                    )}
                                    {/* spacer removed */}
                                </div>
                            </div>
                            {/* 버튼 행 높이와 동일한 투명 스페이서 — 노란색 박스와 높이 맞춤 */}
                            <div style={{ height: 55, flexShrink: 0 }} />
                        </div>
                    </div>
                </div>

                {feedback && (
                        <div style={{ position: 'absolute', inset: 0, zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.1)', backdropFilter: 'blur(4px)' }}>
                            <div className="pop-in" style={{
                                background: 'white', padding: '80px 60px', borderRadius: 48,
                                border: `8px solid ${feedback.type === 'correct' ? '#fde68a' : '#fca5a5'}`,
                                boxShadow: '0 30px 80px rgba(0,0,0,0.2)',
                                textAlign: 'center', maxWidth: 700, width: '90%'
                            }}>
                                <div style={{ fontSize: 120, marginBottom: 24 }}>{feedback.type === 'correct' ? '🌟' : '🧐'}</div>
                                <h3 style={{ fontSize: 52, fontWeight: 900, marginBottom: 24, color: '#1e293b' }}>{feedback.type === 'correct' ? '참 잘했어요!' : '다시 해볼까?'}</h3>
                                <p style={{ color: '#475569', fontSize: 38, fontWeight: 700, lineHeight: 1.6, marginBottom: 48, wordBreak: 'keep-all', whiteSpace: 'pre-line' }}>
                                    {feedback.msg.split(/([0-9]+)/).map((part, i) => 
                                        /^[0-9]+$/.test(part) 
                                            ? <span key={i} style={{ color: '#16a34a', fontSize: '1.2em', background: 'linear-gradient(to top, #dcfce7 40%, transparent 40%)', padding: '0 4px', margin: '0 4px', display: 'inline-block', verticalAlign: 'middle', fontWeight: 900 }}>{part}</span> 
                                            : part
                                    )}
                                </p>
                                <button className="confirm-btn" onClick={next}
                                    style={{ width: '100%', padding: '24px', borderRadius: 24, fontSize: 40, fontWeight: 900, color: 'white', border: 'none', cursor: 'pointer', background: feedback.type === 'correct' ? '#22c55e' : '#ef4444', boxShadow: feedback.type === 'correct' ? '0 10px 24px rgba(34,197,94,0.4)' : '0 10px 24px rgba(239,68,68,0.4)' }}>
                                    {feedback.type === 'correct' ? '확인' : '수정하기'}
                                </button>
                            </div>
                        </div>
                    )}

                    {stamp && (
                        <div style={{ position: 'absolute', inset: 0, zIndex: 110, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.3)', backdropFilter: 'blur(8px)' }}>
                            <div className="stamp-in" style={{
                                background: 'white', padding: '48px 64px', borderRadius: 64, boxShadow: '0 40px 100px rgba(0,0,0,0.2)',
                                border: '12px solid #a7f3d0', textAlign: 'center', maxWidth: 1000, width: '90%'
                            }}>
                                <div style={{ fontSize: 80, marginBottom: 12 }}>📊</div>
                                <h2 style={{ fontSize: 44, fontWeight: 900, color: '#166534', marginBottom: 24 }}>학습 결과 보고서</h2>

                                <div style={{ textAlign: 'left', background: '#f0fdf4', padding: 28, borderRadius: 32, marginBottom: 32, width: '100%', border: '2px solid #dcfce7' }}>
                                    <p style={{ fontSize: 24, marginBottom: 16 }}>👤 <b>모험가:</b> {currentUser?.name} ({currentUser?.num}번)</p>
                                    <p style={{ fontSize: 24, marginBottom: 16 }}>📅 <b>날짜:</b> {new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    <p style={{ fontSize: 24, marginBottom: 16 }}>📖 <b>학습 내용(맞힘):</b> {STAGE_DATA[phase - 1]?.name} ({problems.filter(prb => !wrong.find(w => w.id === prb.id)).map(prb => prb.q).join(', ')})</p>
                                    <div style={{ fontSize: 24 }}>
                                        <b>❌ 틀린 내용:</b> {wrong.length > 0 ? (
                                            <div style={{ marginTop: 12, padding: 16, background: 'white', borderRadius: 16, border: '1px solid #fee2e2' }}>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16, color: '#e11d48', fontWeight: 900 }}>
                                                    {wrong.map((w, i) => (
                                                        <span key={i} style={{ fontSize: 24 }}>{w.q}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : <span style={{ color: '#16a34a', marginLeft: 10 }}> ✨ 모든 문제를 완벽하게 풀었어요!</span>}
                                    </div>
                                </div>

                                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                                    <div style={{ display: 'flex', gap: 16 }}>
                                        {wrong.length > 0 && (
                                            <button className="confirm-btn" onClick={() => {
                                                // 3단계의 경우: 한 숫자 q의 digit/read 중 하나만 틀려도 두 문제(짝)를 함께 다시 풀도록
                                                let expandedWrong = wrong;
                                                if (phase === 3) {
                                                    const allP3 = allProbs[3] || [];
                                                    const wrongQs = new Set(wrong.map(w => w.q));
                                                    // 틀린 q값에 해당하는 모든 문제(digit + read)를 원래 순서대로 가져옴
                                                    expandedWrong = allP3.filter(prb => wrongQs.has(prb.q));
                                                }
                                                const firstWrong = expandedWrong[0];
                                                setWrong(expandedWrong);
                                                setReviewMode(true);
                                                setStamp(false);
                                                setProbIdx(0);
                                                // 기존 입력값 초기화
                                                if (firstWrong && firstWrong.ans) {
                                                    setDrops(new Array(firstWrong.ans.length).fill(null));
                                                } else {
                                                    setDrops([]);
                                                }
                                                setTranscript('');
                                                setVoiceResult(null);
                                                setVoiceStep('sino');
                                            }}
                                                style={{ flex: 1, padding: '20px', background: '#f97316', color: 'white', borderRadius: 24, fontSize: 26, fontWeight: 900, border: 'none', cursor: 'pointer', boxShadow: '0 8px 24px rgba(249,115,22,0.4)' }}>
                                                🔄 틀린 문제 다시 풀기
                                            </button>
                                        )}
                                        {phase < 4 && (
                                            <button className="confirm-btn" 
                                                disabled={wrong.length > 0}
                                                onClick={() => goStage(phase + 1)}
                                                style={{ 
                                                    flex: 1, padding: '20px', 
                                                    background: wrong.length > 0 ? '#cbd5e1' : '#22c55e', 
                                                    color: 'white', borderRadius: 24, fontSize: 26, fontWeight: 900, border: 'none', 
                                                    cursor: wrong.length > 0 ? 'not-allowed' : 'pointer', 
                                                    boxShadow: wrong.length > 0 ? 'none' : '0 8px 24px rgba(34,197,94,0.4)',
                                                    opacity: wrong.length > 0 ? 0.6 : 1
                                                }}>
                                                다음 단계 모험하기 ⏩
                                            </button>
                                        )}
                                    </div>
                                    <button className="confirm-btn" 
                                        disabled={wrong.length > 0}
                                        onClick={() => { setStep('map'); setStamp(false); setReviewMode(false); }}
                                        style={{ 
                                            padding: '16px', 
                                            background: wrong.length > 0 ? '#f1f5f9' : '#f1f5f9', 
                                            color: wrong.length > 0 ? '#e2e8f0' : '#94a3b8', 
                                            borderRadius: 24, fontSize: 22, fontWeight: 900, border: 'none', 
                                            cursor: wrong.length > 0 ? 'not-allowed' : 'pointer',
                                            opacity: wrong.length > 0 ? 0.5 : 1
                                        }}>
                                        지도로 돌아가기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 튜토리얼 모달 */}
                    {renderTutorial()}
                </div>
            );

            return null;
        }

        function ScaleWrapper({ children }) {
            const [scale, setScale] = useState(1);
            useEffect(() => {
                const handleResize = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    const scaleFactor = Math.min(width / 1280, height / 800);
                    setScale(scaleFactor);
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            return (
                <div className="scale-container" style={{ transform: `scale(${scale})` }}>
                    {children}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScaleWrapper><App /></ScaleWrapper>);
    </script>
</body>

</html>
