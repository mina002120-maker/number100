        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxW25K14-LmcZAIr1fFVx_BXprXsJ1iGhuMJ_N5j9RvDmGoXTAcnmLHBWYJFxbxyWJM/exec";

        /**
         * 외부에서 구글 앱스크립트 함수를 호출하기 위한 통신 함수 (JSONP 방식)
         */
        async function callGas(action, data = {}) {
            // URL이 설정되지 않았거나 유효한 GAS URL이 아니면 무시
            if (!GAS_WEB_APP_URL || !GAS_WEB_APP_URL.startsWith('https://script.google.com')) {
                console.warn("GAS_WEB_APP_URL이 설정되지 않았습니다.");
                return null;
            }

            return new Promise((resolve, reject) => {
                const callbackName = 'gas_callback_' + Math.round(Math.random() * 1000000);

                // 타임아웃 설정 (10초)
                const timeout = setTimeout(() => {
                    delete window[callbackName];
                    console.error("GAS 호출 시간 초과");
                    resolve(null);
                }, 10000);

                window[callbackName] = (response) => {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    resolve(response);
                };

                const script = document.createElement('script');
                const url = new URL(GAS_WEB_APP_URL);
                url.searchParams.append('action', action);
                url.searchParams.append('callback', callbackName);
                Object.keys(data).forEach(key => url.searchParams.append(key, data[key]));

                script.src = url.toString();
                script.onerror = () => {
                    clearTimeout(timeout);
                    resolve(null);
                };
                document.body.appendChild(script);
                // 스크립트 태그는 호출 후 삭제
                setTimeout(() => document.body.removeChild(script), 1000);
            });
        }

            if (!GAS_WEB_APP_URL || !GAS_WEB_APP_URL.startsWith('https://script.google.com')) return;
            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action, ...data })
            });

            if (!window.speechSynthesis || muted) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ko-KR';
            window.speechSynthesis.speak(u);
        };

        /* 숫자를 한자어 읽기로 변환 (예: 49 -> 사십구) */
        function convertDigitsToSino(text) {
            return text.replace(/[0-9]+/g, match => {
                const num = parseInt(match, 10);
                if (num === 0) return '영';
                if (num >= 100) return match; // 100 이상은 처리 생략 (1~99 범위만)

                let result = '';
                const tens = Math.floor(num / 10);
                const units = num % 10;

                if (tens === 1) result += '십';
                else if (tens > 1) result += S_ORDER[tens - 1];

                if (units > 0) result += S_UNITS[units];
                return result;
            });
        }

        /* 숫자를 우리말 읽기로 변환 (예: 49 -> 마흔아홉) */
        function convertDigitsToNative(text) {
            return text.replace(/[0-9]+/g, match => {
                const num = parseInt(match, 10);
                if (num === 0) return '영';
                if (num >= 100) return match;

                const tens = Math.floor(num / 10);
                const units = num % 10;

                if (units === 0) return K_ORDER[tens - 1];
                return K_ORDER[tens - 1] + K_UNITS[units];
            });
        }

        /* 유효한 읽기 목록 반환 (순우리말 + 한자어) */
        function getValidReadings(n) {
            const tens = Math.floor(n / 10);
            const units = n % 10;
            if (units === 0) {
                return [K_ORDER[tens - 1], S_ORDER[tens - 1]];
            } else {
                const native = K_ORDER[tens - 1] + K_UNITS[units];
                const sino = (tens === 1 ? '십' : S_ORDER[tens - 1]) + S_UNITS[units];
                return [native, sino];
            }
        }

        /* 우리말 읽기 반환 (4단계 정답용) */
        function getNativeReading(n) {
            const tens = Math.floor(n / 10);
            const units = n % 10;
            if (units === 0) return K_ORDER[tens - 1];
            return K_ORDER[tens - 1] + K_UNITS[units];
        }

            const tens = Math.floor(n / 10);
            const units = n % 10;
            // 한자어 단서 (십모형: 십, 이십... / 낱개: 일, 이...)
            const sinoTens = tens === 1 ? '십' : S_ORDER[tens - 1];
            const sinoUnits = units > 0 ? S_UNITS[units] : '';
            if (units === 0) {

                    { sinoFull: sinoTens }  // 한자어 전체만 (우리말 숨김)

            }
            return [

                { label: '주황색 낱개', count: units, sinoValue: sinoUnits },
                { sinoFull: sinoTens + sinoUnits }  // 한자어 전체만 (우리말 숨김)
            ];
        }

                        {[...Array(tens)].map((_, i) => <TenBlock key={`t-${i}`} />)}
                    </div>
                    {/* 일모형 그룹 */}
                    {units > 0 && (
                        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', maxWidth: 60, justifyContent: 'center' }}>
                            {[...Array(units)].map((_, i) => <OneBlock key={`u-${i}`} />)}
                        </div>
                    )}
                </div>
            );
        }

        /* ===== 선택 카드 ===== */
        function SelectionCard({ value, onClick, small, colorScheme, selected }) {
            const styles = {
                blue: { border: '#93c5fd', shadow: '#60a5fa', bg: '#3b82f6', activeBorder: '#2563eb' },
                pink: { border: '#f9a8d4', shadow: '#f472b6', bg: '#ec4899', activeBorder: '#db2777' },
                yellow: { border: '#fde68a', shadow: '#fcd34d', bg: '#facc15', activeBorder: '#eab308' },
                green: { border: '#86efac', shadow: '#4ade80', bg: '#22c55e', activeBorder: '#16a34a' },
                orange: { border: '#fdba74', shadow: '#fb923c', bg: '#f97316', activeBorder: '#ea580c' },
                purple: { border: '#d8b4fe', shadow: '#a855f7', bg: '#a855f7', activeBorder: '#9333ea' }
            };
            const s = styles[colorScheme] || styles.yellow;
            return (
                <button
                    onClick={() => onClick(value)}
                    className="card-item"
                    style={{
                        background: selected ? s.bg : 'white', 
                        padding: small ? '0px' : '24px 40px', borderRadius: small ? 16 : 32,
                        border: selected ? `${small ? 4 : 5}px solid ${s.activeBorder}` : `${small ? 4 : 5}px solid ${s.border}`, 
                        boxShadow: selected ? 'none' : `0 ${small ? 4 : 8}px 0 ${s.shadow}`,
                        transform: selected ? 'translateY(4px)' : 'none',
                        width: small ? 90 : 'auto', minWidth: small ? 90 : 120, height: small ? 80 : 'auto', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                        cursor: 'pointer', outline: 'none', boxSizing: 'border-box',
                        transition: 'all 0.1s'
                    }}
                >
                    <span style={{ fontSize: small ? 32 : 48, fontWeight: 900, color: selected ? 'white' : '#334155', whiteSpace: 'nowrap' }}>{value}</span>
                </button>
            );
        }

        /* ===== 문제 생성 ===== */
        function buildProblems(stage4Count = 5) {
            // 셔플 함수
            const shuffle = (arr) => {
                const result = [...arr];
                for (let i = result.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            };

            // 1단계: 10씩 묶기 (10의 배수 중 랜덤 3개)
            const tens = shuffle([10, 20, 30, 40, 50, 60, 70, 80, 90]).slice(0, 3);
            const p1 = tens.map(n => ({
                id: `p1-${n}`, phase: 1, type: 'bundle', q: n,
                ans: [NUM_WORDS[n].s, NUM_WORDS[n].k],
                hint: `십모형이 ${n / 10}개예요.\n10이 ${n / 10}개인 수를 어떻게 읽을까요?`
            }));

            // 2단계: 수 쓰기 (11~99 중 랜덤 3개, 일의 자리가 0이 아닌 수)
            const twoDigits = shuffle(Array.from({ length: 89 }, (_, i) => i + 11).filter(n => n % 10 !== 0)).slice(0, 3);
            const p2 = twoDigits.map(n => {
                const ten = Math.floor(n / 10) * 10, unit = n % 10;
                return {
                    id: `p2-${n}`, phase: 2, type: 'digit',
                    q: `${NUM_WORDS[ten].k}${K_UNITS[unit]}`,
                    ans: [Math.floor(n / 10).toString(), (n % 10).toString()],
                    hint: `'${NUM_WORDS[ten].k}'은 십모형 ${Math.floor(n / 10)}개,\n'${K_UNITS[unit]}'은 낱개 ${unit}개를 의미해요.`
                };
            });

            // 3단계: 수 읽기 (11~99 중 랜덤 3개, 2단계와 겹치지 않도록)
            const readPool = shuffle(Array.from({ length: 89 }, (_, i) => i + 11).filter(n => n % 10 !== 0 && !twoDigits.includes(n))).slice(0, 3);
            const p3 = [];
            readPool.forEach(n => {
                p3.push({
                    id: `p3a-${n}`, phase: 3, type: 'digit', q: n,
                    ans: [Math.floor(n / 10).toString(), (n % 10).toString()],
                    hint: `십모형이 ${Math.floor(n / 10)}개, 낱개가 ${n % 10}개 있어요.\n어떤 숫자일까요?`
                });
                p3.push({
                    id: `p3-${n}`, phase: 3, type: 'read', q: n,
                    ans: [NUM_WORDS[Math.floor(n / 10) * 10].k, K_UNITS[n % 10]],
                    hint: `십모형이 ${Math.floor(n / 10)}개, 낱개가 ${n % 10}개 있어요.\n어떻게 읽을까요?`
                });
            });

            // 4단계: 우리말로 읽기 (랜덤 생성)
            const pool = [];
            for (let i = 11; i < 100; i++) pool.push(i);
            const stage4Numbers = shuffle(pool).slice(0, stage4Count);

            const p4 = stage4Numbers.map(n => {
                const native = getNativeReading(n);
                const sinoTens = Math.floor(n / 10) === 1 ? '십' : S_ORDER[Math.floor(n / 10) - 1];
                const sinoUnits = (n % 10 > 0) ? S_UNITS[n % 10] : '';
                const sino = sinoTens + sinoUnits;
                return {
                    id: `p4-${n}`, phase: 4, type: 'voice', q: n,
                    sinoReading: sino,
                    nativeReading: native,
                    correctReading: native,  // 정답 표시용 (우리말)
                    validReadings: [native],  // 우리말만 정답
                    blockHint: getBlockHint(n)
                };
            });
            return {
                1: p1,
                2: p2,
                3: p3,
                4: p4
            };
        }

        /* ===== 메인 앱 ===== */
        function App() {
            const [step, setStep] = useState('intro');
            const [students, setStudents] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [phase, setPhase] = useState(1);
            const [probIdx, setProbIdx] = useState(0);
            const [completed, setCompleted] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [drops, setDrops] = useState([]);
            const [muted, setMuted] = useState(true);
            const [wrong, setWrong] = useState([]);
            const [reviewMode, setReviewMode] = useState(false);
            const [stamp, setStamp] = useState(false);
            // 마이크 / 음성 녹음 상태
            const [micAllowed, setMicAllowed] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [interimTranscript, setInterimTranscript] = useState('');
            const [voiceResult, setVoiceResult] = useState(null); // null | 'correct' | 'wrong'
            const [voiceStep, setVoiceStep] = useState('sino'); // 'sino' | 'native'
            const [showHint, setShowHint] = useState(false);
            const [recordingAttempted, setRecordingAttempted] = useState(false); // 녹음 시도 여부
            const [allProbs, setAllProbs] = useState(() => buildProblems());
            const [showConfig4, setShowConfig4] = useState(false);
            const [sessionId, setSessionId] = useState('');
            const [tutorial, setTutorial] = useState(null);  // 현재 표시 중인 튜토리얼 단계 번호 (null이면 안 보임)
            const [tutorialStep, setTutorialStep] = useState(0);  // 튜토리얼 내부 진행 단계
            const [seenTutorials, setSeenTutorials] = useState([]);  // 이미 본 단계 (한 세션에서 한 번만)
            const recogRef = useRef(null);

            // 학생 명단 불러오기
            useEffect(() => {
                if (step === 'login' && students.length === 0) {
                    setIsLoading(true);

                    const loadStudents = async () => {
                        let data = null;
                        if (GAS_WEB_APP_URL !== "YOUR_GAS_WEB_APP_URL_HERE") {
                            data = await callGas('getStudentList');
                        }

                        if (data && Array.isArray(data)) {
                            setStudents(data);
                            setIsLoading(false);
                        } else {
                            // URL이 없거나 호출 실패 시 가상 데이터 사용
                            console.log("가상 데이터를 불러옵니다.");
                            setTimeout(() => {
                                setStudents([
                                    { num: 1, name: "홍길동(연습)" },
                                    { num: 2, name: "김철수(연습)" },
                                    { num: 3, name: "이영희(연습)" }
                                ]);
                                setIsLoading(false);
                            }, 500);
                        }
                    };

                    loadStudents();
                }
            }, [step]);

            // 외부 화면은 항상 진짜 문제 사용 (튜토리얼은 자체 미니 화면에서 진행)
            const problems = reviewMode ? wrong : (allProbs[phase] || allProbs[1]);
            const p = problems[probIdx] || problems[0];

            const cards = useMemo(() => {
                if (!p) return [];
                if (p.type === 'bundle') return [...S_ORDER, ...K_ORDER];
                if (p.type === 'digit') return ALL_DIGITS;
                if (p.type === 'read') return [...K_ORDER, ...K_UNITS.filter(u => u !== "")];
                return [];
            }, [p]);

            useEffect(() => {
                // 튜토리얼 중에는 외부 drops를 건드리지 않음 (튜토리얼 내부에서 관리)
                if (tutorial) return;
                if (p && step === 'play' && p.type !== 'voice') setDrops(new Array(p.ans.length).fill(null));
            }, [p?.id, step, tutorial]);

            // 튜토리얼 step 변경 시 problemIdx가 바뀌면 drops 초기화
            useEffect(() => {
                if (!tutorial) return;
                const scenario = TUTORIAL_DATA[tutorial];
                if (!scenario?.tutorialProblems) return;  // 단일 문제면 처리 불필요
                const currentStep = scenario.steps[tutorialStep];
                const prevStep = tutorialStep > 0 ? scenario.steps[tutorialStep - 1] : null;
                // 이전 step과 problemIdx가 다르면 (문제 전환) drops 초기화
                if (currentStep && prevStep && (currentStep.problemIdx ?? 0) !== (prevStep.problemIdx ?? 0)) {
                    const newProblem = scenario.tutorialProblems[currentStep.problemIdx];
                    if (newProblem) setDrops(new Array(newProblem.ans.length).fill(null));
                }
            }, [tutorialStep, tutorial]);

            // 음성 상태 초기화 (문제 변경 시)
            useEffect(() => {
                setTranscript('');
                setInterimTranscript('');
                setVoiceResult(null);
                setVoiceStep('sino');
                setIsRecording(false);
                setShowHint(false);
                setRecordingAttempted(false);  // 새 문제에서는 녹음 시도 초기화
                if (recogRef.current) {
                    try { recogRef.current.abort(); } catch (e) { }
                    recogRef.current = null;
                }
            }, [probIdx, phase]);

            // voiceStep 변경 시(sino → native) 녹음 시도 초기화
            useEffect(() => {
                setRecordingAttempted(false);
            }, [voiceStep]);

            const handleCardClick = (val, targetIdx) => {
                // 튜토리얼 모드에서는 예상 동작과 일치할 때만 진행 허용
                if (tutorial) {
                    const scenario = TUTORIAL_DATA[tutorial];
                    const currentStep = scenario.steps[tutorialStep];
                    if (currentStep && currentStep.action === 'click' && currentStep.target?.startsWith('card-')) {
                        // 예상한 카드인지 확인
                        if (currentStep.expectedValue !== val) {
                            // 다른 카드를 누르면 무시 (또는 흔들기 효과 등 가능)
                            return;
                        }
                        // 예상 위치에 넣기
                        let next = [...drops];
                        if (next.length === 0 && p) next = new Array(p.ans.length).fill(null);
                        const idx = currentStep.expectedIdx !== undefined ? currentStep.expectedIdx : next.indexOf(null);
                        next[idx] = val;
                        setDrops(next);
                        // 다음 튜토리얼 스텝으로
                        setTimeout(() => setTutorialStep(tutorialStep + 1), 300);
                        return;
                    } else {
                        // 튜토리얼 중 클릭 단계가 아니면 무시
                        return;
                    }
                }

                let next = [...drops];
                if (next.length === 0 && p) {
                    next = new Array(p.ans.length).fill(null);
                }
                const idx = (targetIdx !== undefined) ? targetIdx : next.indexOf(null);
                if (idx !== -1) {
                    next[idx] = val;
                    setDrops(next);
                }
            };

            const clearDrop = (idx) => {
                const next = [...drops];
                next[idx] = null;
                setDrops(next);
            };

            const checkAnswer = () => {
                if (drops.includes(null)) {
                    speak("공간을 모두 채워주세요.", muted);
                    return;
                }

                // 튜토리얼 모드에서 정답 버튼을 누른 경우
                if (tutorial) {
                    const scenario = TUTORIAL_DATA[tutorial];
                    const currentStep = scenario.steps[tutorialStep];
                    if (currentStep && currentStep.action === 'click' && currentStep.target === 'submit') {
                        // 다음 스텝으로 (보통 finish 메시지)
                        if (window.confetti) {
                            window.confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#22c55e', '#3b82f6', '#fbbf24'] });
                        }
                        speak('참 잘했어요!', muted);
                        setTimeout(() => setTutorialStep(tutorialStep + 1), 400);
                    }
                    return;
                }

                const ok = p.phase === 1
                    ? p.ans.every(a => drops.includes(a))
                    : p.ans.every((a, i) => drops[i] === a);
                if (ok) {
                    let msg = "";
                    if (p.phase === 1) {
                        msg = `십모형이 ${p.q / 10}개니까\n10이 ${p.q / 10}개인 수가 맞네!`;
                    } else if (p.phase === 2) {
                        const val = drops.join('');
                        msg = `십모형 ${val[0]}개와\n낱개 ${val[1]}개를 숫자로 아주 잘 썼어!`;
                    } else if (p.phase === 3) {
                        if (p.type === 'digit') {
                            msg = `수 모형을 숫자로 아주 잘 바꿨어!\n${p.q}은 십모형 ${Math.floor(p.q / 10)}개, 낱개 ${p.q % 10}개야.`;
                        } else {
                            msg = `수 모형을 한글로 아주 잘 읽었어!\n${p.q}은 십모형 ${Math.floor(p.q / 10)}개, 낱개 ${p.q % 10}개야.`;
                        }
                    }

                    setFeedback({ type: 'correct', msg: msg });
                    speak('정답이야! 참 잘했어.', muted);

                    if (window.confetti) {
                        window.confetti({
                            particleCount: 150,
                            spread: 70,
                            origin: { y: 0.6 },
                            colors: ['#22c55e', '#3b82f6', '#fbbf24', '#ef4444']
                        });
                    }
                } else {
                    let msg = "";
                    if (p.phase === 1) {
                        const hasSino = drops.includes(p.ans[0]);
                        const hasNative = drops.includes(p.ans[1]);
                        if (hasSino && !hasNative) {
                            msg = `'${p.ans[0]}'은 잘 찾았어!\n나머지 하나도 한번 찾아볼까?`;
                        } else if (!hasSino && hasNative) {
                            msg = `'${p.ans[1]}'은 잘 찾았어!\n나머지 하나도 한번 찾아볼까?`;
                        } else {
                            msg = `십모형이 ${p.q / 10}개네!\n10이 ${p.q / 10}개인 수를 두 가지 방법으로 찾아보자.`;
                        }
                    } else if (p.phase === 2) {
                        const tensOk = drops[0] === p.ans[0];
                        const unitsOk = drops[1] === p.ans[1];
                        const n = parseInt(Object.keys(NUM_WORDS).find(key => NUM_WORDS[key].k + K_UNITS[key % 10] === p.q) || 0);
                        if (tensOk && !unitsOk) {
                            msg = `십의 자리 '${drops[0]}'은 잘 썼어!\n낱개가 ${p.ans[1]}개니까 일의 자리를 다시 확인해볼까?`;
                        } else if (!tensOk && unitsOk) {
                            msg = `일의 자리 '${drops[1]}'은 잘 썼어!\n십모형이 ${p.ans[0]}개니까 십의 자리를 다시 확인해볼까?`;
                        } else {
                            msg = p.hint;
                        }
                    } else if (p.phase === 3) {
                        const tensOk = drops[0] === p.ans[0];
                        const unitsOk = drops[1] === p.ans[1];
                        if (p.type === 'digit') {
                            if (tensOk && !unitsOk) {
                                msg = `십의 자리 '${drops[0]}'은 잘 찾았어!\n낱개가 ${p.q % 10}개니까 일의 자리에 들어갈 숫자를 다시 생각해볼까?`;
                            } else if (!tensOk && unitsOk) {
                                msg = `일의 자리 '${drops[1]}'은 잘 찾았어!\n십모형이 ${Math.floor(p.q / 10)}개니까 십의 자리에 들어갈 숫자를 다시 생각해볼까?`;
                            } else {
                                msg = p.hint;
                            }
                        } else {
                            if (tensOk && !unitsOk) {
                                msg = `십의 자리 '${drops[0]}'은 잘 찾았어!\n낱개가 ${p.q % 10}개일 때 어떻게 읽는지 다시 생각해볼까?`;
                            } else if (!tensOk && unitsOk) {
                                msg = `일의 자리 '${drops[1]}'은 잘 찾았어!\n십모형이 ${Math.floor(p.q / 10)}개일 때 어떻게 읽는지 다시 생각해볼까?`;
                            } else {
                                msg = p.hint;
                            }
                        }
                    }
                    if (!reviewMode && !wrong.find(w => w.id === p.id)) setWrong(pr => [...pr, p]);
                    setFeedback({ type: 'wrong', msg: msg || p.hint });
                    speak('다시 한번 생각해볼까?', muted);
                }
            };

            const next = () => {
                if (feedback?.type === 'wrong') {
                    setFeedback(null);
                    setDrops(new Array(p.ans.length).fill(null));
                    return;
                }
                setFeedback(null);
                if (probIdx < problems.length - 1) {
                    const ni = probIdx + 1;
                    setProbIdx(ni);
                    setDrops(new Array(problems[ni].ans.length).fill(null));
                } else {
                    if (reviewMode) { setReviewMode(false); setWrong([]); setStep('map'); }
                    else {
                        setStamp(true);
                        if (!completed.includes(phase)) setCompleted(pr => [...pr, phase]);

                        // 활동 기록 저장
                        const correctItems = problems.filter(p => !wrong.find(w => w.id === p.id)).map(p => p.q).join(', ');
                        const wrongItems = wrong.map(p => p.q).join(', ');
                        const rate = Math.round(((problems.length - wrong.length) / problems.length) * 100) + '%';

                        sendGasData('saveActivity', {
                            stageNum: phase,
                            studentNum: currentUser.num,
                            studentName: currentUser.name,
                            rate: rate,
                            correctList: correctItems,
                            wrongList: wrongItems
                        });
                    }
                }
            };

            // 녹음 시작
            const startRecording = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert('이 브라우저에서는 음성 인식을 지원하지 않아요.\n크롬 브라우저를 사용해 주세요!');
                    return;
                }
                // 기존 인식기를 반드시 정리 후 새로 시작 (두 번째 녹음 버그 수정)
                if (recogRef.current) {
                    try { recogRef.current.onresult = null; recogRef.current.onend = null; recogRef.current.onerror = null; recogRef.current.abort(); } catch (e) { }
                    recogRef.current = null;
                }
                const recog = new SpeechRecognition();
                recog.lang = 'ko-KR';
                recog.interimResults = true;  // 실시간 중간 결과 활성화
                recog.maxAlternatives = 5;
                setIsRecording(true);
                setRecordingAttempted(true);  // 녹음 시도함 - 건너뛰기 버튼 활성화
                setTranscript('');
                setInterimTranscript('');
                setVoiceResult(null);
                setShowHint(false);

                recog.onresult = (event) => {
                    let interimText = '';
                    let finalText = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const t = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalText += t;
                        } else {
                            interimText += t;
                        }
                    }
                    // 중간 결과는 실시간 표시
                    if (interimText) {
                        let cleanText = interimText.replace(/\s/g, '').replace(/[.,!?~]/g, '');
                        cleanText = cleanText.replace(new RegExp(p.q.toString(), 'g'), voiceStep === 'sino' ? p.sinoReading : p.nativeReading);
                        setInterimTranscript(voiceStep === 'sino' ? convertDigitsToSino(cleanText) : convertDigitsToNative(cleanText));
                    }

                    // 최종 결과 처리
                    if (finalText) {
                        // 가장 신뢰도 높은 첫 번째 결과만 사용 (alternatives 전체 사용 시 오인식 발생)
                        const primaryRaw = event.results[event.results.length - 1][0].transcript;
                        const primaryClean = primaryRaw.replace(/\s/g, '').replace(/[.,!?~]/g, '');

                        const targetReading = voiceStep === 'sino' ? p.sinoReading : p.nativeReading;
                        const oppositeReading = voiceStep === 'sino' ? p.nativeReading : p.sinoReading;

                        // 숫자가 인식된 경우 양방향 변환을 모두 시도해서 어느 쪽과 매치되는지 확인
                        // (인식기가 "72"를 반환했을 때, 사용자가 "칠십이"를 말했을 수도, "일흔둘"을 말했을 수도 있음)
                        let primarySinoForm = primaryClean;
                        let primaryNativeForm = primaryClean;
                        if (/[0-9]/.test(primaryClean)) {
                            primarySinoForm = convertDigitsToSino(primaryClean);
                            primaryNativeForm = convertDigitsToNative(primaryClean);
                        }

                        // 한글만 추출하여 비교
                        const cleanSino = primarySinoForm.replace(/[^가-힣]/g, '');
                        const cleanNative = primaryNativeForm.replace(/[^가-힣]/g, '');
                        const cleanTarget = targetReading.replace(/[^가-힣]/g, '');
                        const cleanOpposite = oppositeReading.replace(/[^가-힣]/g, '');

                        // 비교 대상: 사용자가 숫자가 아닌 한글로 직접 말한 경우 그대로 사용
                        const cleanPrimary = primaryClean.replace(/[^가-힣]/g, '');

                        let matched = false;
                        let bestText = primaryClean;

                        // CASE A: 사용자가 한글로 직접 말한 경우 (숫자 없음)
                        if (!/[0-9]/.test(primaryClean)) {
                            // 반대 단계 읽기를 말했으면 명시적으로 오답
                            if (cleanPrimary.length >= 2 && cleanPrimary === cleanOpposite) {
                                matched = false;
                                bestText = cleanPrimary;
                            }
                            // 정답과 정확히 일치
                            else if (cleanPrimary.length >= 2 && cleanPrimary === cleanTarget) {
                                matched = true;
                                bestText = cleanPrimary;
                            } else {
                                matched = false;
                                bestText = cleanPrimary || primaryClean;
                            }
                        }
                        // CASE B: 숫자가 인식된 경우 - 양방향 변환 후 비교
                        else {
                            // 현재 단계 형식으로 변환한 것이 정답과 일치하면 정답
                            const currentForm = voiceStep === 'sino' ? cleanSino : cleanNative;
                            if (currentForm.length >= 2 && currentForm === cleanTarget) {
                                matched = true;
                                bestText = currentForm;
                            } else {
                                matched = false;
                                // 사용자가 반대 단계로 읽었는지 확인 (피드백용)
                                const oppositeForm = voiceStep === 'sino' ? cleanNative : cleanSino;
                                if (oppositeForm.length >= 2 && oppositeForm === cleanOpposite) {
                                    // 반대 단계로 읽음 - 학생이 실제로 발화한 형태로 표시
                                    bestText = oppositeForm;
                                } else {
                                    bestText = currentForm || primaryClean;
                                }
                            }
                        }

                        setInterimTranscript('');
                        setTranscript(bestText);
                        setVoiceResult(matched ? 'correct' : 'wrong');
                        setIsRecording(false);

                        // ★ 처음 틀린 순간 바로 'wrong' 목록에 추가 (나중에 정답을 맞혀도 정답률/정답내용에서 제외하기 위함)
                        if (!matched && !reviewMode && !wrong.find(w => w.id === p.id)) {
                            setWrong(pr => [...pr, p]);
                        }

                        if (matched) {
                            speak(voiceStep === 'sino' ? '정답이야! 이제 우리말로 바꿔볼까?' : '정답이야! 너무 잘 읽었어.', muted);
                            if (window.confetti && voiceStep === 'native') window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#22c55e', '#3b82f6', '#fbbf24', '#ef4444'] });
                        } else {
                            speak('다시 한번 읽어볼까?', muted);
                        }

                        sendGasData('saveVoiceRecord', {
                            studentNum: currentUser.num,
                            studentName: currentUser.name,
                            totalCount: problems.length,
                            probIndex: probIdx + 1,
                            voiceStep: voiceStep,
                            transcribed: bestText,
                            isCorrect: matched ? '정답' : '오답',
                            sessionId: sessionId
                        });
                    }
                };
                recog.onerror = (e) => {
                    setIsRecording(false);
                    setInterimTranscript('');
                    if (e.error === 'no-speech') setTranscript('소리가 들리지 않아요. 다시 시도해주세요!');
                    else if (e.error === 'not-allowed') setTranscript('마이크 사용이 거부되었어요.');
                    else setTranscript('인식에 실패했어요. 다시 시도해주세요!');
                };
                recog.onend = () => { setIsRecording(false); setInterimTranscript(''); };
                recogRef.current = recog;
                try {
                    recog.start();
                } catch (e) {
                    console.warn('recog.start() 실패:', e);
                    setIsRecording(false);
                    setTranscript('마이크를 켤 수 없어요. 브라우저를 새로고침 해보세요!');
                }
            };

            // 음성 다음 문제
            const nextVoice = () => {
                setTranscript('');
                setVoiceResult(null);
                if (probIdx < problems.length - 1) {
                    setProbIdx(probIdx + 1);
                } else {
                    if (reviewMode) { setReviewMode(false); setWrong([]); setStep('map'); }
                    else {
                        setStamp(true);
                        if (!completed.includes(phase)) setCompleted(pr => [...pr, phase]);
                        if (currentUser) {
                            const correctItems = problems.filter(p => !wrong.find(w => w.id === p.id)).map(p => p.q).join(', ');
                            const wrongItems = wrong.map(p => p.q).join(', ');
                            const rate = Math.round(((problems.length - wrong.length) / problems.length) * 100) + '%';

                            sendGasData('saveActivity', {
                                stageNum: phase,
                                studentNum: currentUser.num,
                                studentName: currentUser.name,
                                rate: rate,
                                correctList: correctItems,
                                wrongList: wrongItems
                            });
                        }
                    }
                }
            };

            const goStage = (id) => {
                if (id === 4) {
                    setStep('map');
                    setStamp(false);
                    setShowConfig4(true);
                } else {
                    const newProbs = buildProblems();
                    setAllProbs(prev => ({ ...prev, [id]: newProbs[id] }));
                    const firstP = newProbs[id][0];
                    setPhase(id);
                    setProbIdx(0);
                    setWrong([]);
                    setFeedback(null);
                    setStamp(false);
                    setTranscript('');
                    setVoiceResult(null);
                    setShowHint(false);
                    setDrops(firstP.ans ? new Array(firstP.ans.length).fill(null) : []);
                    setStep('play');
                    // 첫 진입 시 튜토리얼 표시 (튜토리얼 시작 시 drops는 튜토리얼 문제 크기로 재설정)
                    if (!seenTutorials.includes(id)) {
                        const tutData = TUTORIAL_DATA[id];
                        if (tutData?.tutorialProblem) {
                            setDrops(new Array(tutData.tutorialProblem.ans.length).fill(null));
                        }
                        setTutorial(id);
                        setTutorialStep(0);
                        setSeenTutorials(prev => [...prev, id]);
                    }
                }
            };

            const startStage4 = (count) => {
                const newProbs = buildProblems(count);
                setAllProbs(newProbs);
                setPhase(4);
                setProbIdx(0);
                setWrong([]);
                setFeedback(null);
                setStamp(false);
                setTranscript('');
                setVoiceResult(null);
                setShowHint(false);
                setShowConfig4(false);
                setSessionId(Date.now().toString());
                setStep('play');
                // 4단계 첫 진입 시 튜토리얼 표시
                if (!seenTutorials.includes(4)) {
                    setTutorial(4);
                    setTutorialStep(0);
                    setSeenTutorials(prev => [...prev, 4]);
                }
            };

            /* ── 인터랙티브 튜토리얼 (말풍선) ── */
            const renderTutorial = () => {
                if (!tutorial || !TUTORIAL_DATA[tutorial]) return null;
                const scenario = TUTORIAL_DATA[tutorial];
                const currentStep = scenario.steps[tutorialStep];
                if (!currentStep) return null;

                const isNextAction = currentStep.action === 'next' || currentStep.action === 'finish';
                const isLast = tutorialStep === scenario.steps.length - 1;

                // 튜토리얼용 가짜 문제 (각 단계별)
                // tutorialProblems(배열)이 있으면 현재 step의 problemIdx 사용, 없으면 단일 tutorialProblem
                const tutP = scenario.tutorialProblems
                    ? scenario.tutorialProblems[currentStep.problemIdx || 0]
                    : scenario.tutorialProblem;

                // 강조 박스 헬퍼 - 특정 타겟일 때만 노란 반짝 테두리 추가
                const highlightIf = (targetName, extraStyle = {}) => {
                    if (currentStep.target === targetName) {
                        return {
                            ...extraStyle,
                            outline: '5px solid #facc15',
                            outlineOffset: 4,
                            borderRadius: extraStyle.borderRadius || 20,
                            boxShadow: '0 0 0 5px rgba(250,204,21,0.4), 0 10px 30px rgba(250,204,21,0.5)',
                            animation: 'pulseHighlight 1.2s ease-in-out infinite'
                        };
                    }
                    return extraStyle;
                };

                // 카드 클릭 처리 (튜토리얼 내부용)
                // position: 'tens'(십의 자리) | 'units'(일의 자리) | null(1단계: 한자어/우리말은 카드 값 자체로 구분)
                const onTutorialCardClick = (val, idx, position) => {
                    // 타겟 ID 결정: 2/3단계는 'card-tens-X' 또는 'card-units-X', 1단계는 'card-X'
                    const cardId = position ? `card-${position}-${val}` : `card-${val}`;
                    if (currentStep.action === 'click' && currentStep.target === cardId && currentStep.expectedValue === val && currentStep.expectedIdx === idx) {
                        let nextDrops = [...drops];
                        if (nextDrops.length === 0 || nextDrops.length !== (tutP?.ans.length || 2)) {
                            nextDrops = new Array(tutP?.ans.length || 2).fill(null);
                        }
                        nextDrops[idx] = val;
                        setDrops(nextDrops);
                        setTimeout(() => setTutorialStep(tutorialStep + 1), 300);
                    }
                };

                // 수정 버튼 클릭 처리 (튜토리얼 내부용)
                const onTutorialReset = () => {
                    if (currentStep.action === 'click' && currentStep.target === 'reset') {
                        setDrops(new Array(tutP?.ans.length || 2).fill(null));
                        setTimeout(() => setTutorialStep(tutorialStep + 1), 300);
                    }
                };

                // 정답 버튼 클릭 처리
                const onTutorialSubmit = () => {
                    if (currentStep.action === 'click' && currentStep.target === 'submit') {
                        if (window.confetti) {
                            window.confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#22c55e', '#3b82f6', '#fbbf24'] });
                        }
                        speak('참 잘했어요!', muted);
                        setTimeout(() => setTutorialStep(tutorialStep + 1), 400);
                    }
                };

                // 미니 학생 화면 렌더링 (1, 2, 3단계)
                const renderMiniStudentView = () => {
                    if (!tutP) return null;

                    return (
                        <div style={{
                            background: 'white', borderRadius: 24, padding: 16,
                            border: '4px solid #bbf7d0',
                            display: 'flex', flexDirection: 'column', gap: 12,
                            width: '100%', boxSizing: 'border-box'
                        }}>
                            {/* 헤더 */}
                            <div style={{
                                background: '#f0fdf4', padding: '6px 14px', borderRadius: 10,
                                border: '2px solid #bbf7d0',
                                fontSize: 16, fontWeight: 900, color: '#166534', alignSelf: 'flex-start'
                            }}>
                                {tutorial}단계: {STAGE_DATA[tutorial - 1]?.name}
                            </div>

                            {/* 문제 + 정답란 */}
                            <div style={{ display: 'flex', gap: 12, alignItems: 'stretch', minHeight: 180 }}>
                                {/* 문제 박스 */}
                                <div style={highlightIf('question', {
                                    flex: 1, background: '#f0fdf4', border: '5px solid #4ade80',
                                    borderRadius: 24, padding: '16px',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                                })}>
                                    {(tutorial === 1 || tutorial === 3) ? (
                                        <BlocksDisplay value={tutP.q} />
                                    ) : (
                                        <div style={{ fontSize: tutorial === 2 ? 60 : 80, fontWeight: 900, color: '#2563eb', lineHeight: 1 }}>
                                            {tutP.q}
                                        </div>
                                    )}
                                </div>

                                {/* 정답란 */}
                                {tutorial === 1 && (
                                    <div style={{ width: 140, display: 'flex', flexDirection: 'column', gap: 8 }}>
                                        <div style={{ background: 'white', borderRadius: 16, border: '4px solid #fde68a', padding: '12px 8px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, flex: 1, justifyContent: 'center' }}>
                                            {tutP.ans.map((_, idx) => (
                                                <div key={idx} style={{
                                                    width: 80, height: 50, borderRadius: 12,
                                                    border: `3px dashed ${idx === 0 ? '#bfdbfe' : '#fbcfe8'}`,
                                                    background: 'white',
                                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                    fontSize: 24, fontWeight: 900, color: '#1e293b'
                                                }}>{drops[idx] || ''}</div>
                                            ))}
                                        </div>
                                        <div style={{ display: 'flex', gap: 6 }}>
                                            <button
                                                onClick={onTutorialReset}
                                                style={highlightIf('reset', {
                                                    flex: 1, padding: '10px 0', background: '#e11d48',
                                                    color: 'white', borderRadius: 12, fontSize: 13, fontWeight: 900,
                                                    border: 'none', cursor: 'pointer', fontFamily: 'inherit'
                                                })}>
                                                수정 ↩
                                            </button>
                                            <button
                                                onClick={onTutorialSubmit}
                                                disabled={drops.includes(null) || drops.length === 0}
                                                style={highlightIf('submit', {
                                                    flex: 1, padding: '10px 0',
                                                    background: (drops.includes(null) || drops.length === 0) ? '#cbd5e1' : '#22c55e',
                                                    color: 'white', borderRadius: 12, fontSize: 13, fontWeight: 900,
                                                    border: 'none', cursor: (drops.includes(null) || drops.length === 0) ? 'not-allowed' : 'pointer',
                                                    fontFamily: 'inherit'
                                                })}>
                                                정답 ✅
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {(tutorial === 2 || tutorial === 3) && (
                                    <>
                                        <div style={{ width: 200, background: 'white', borderRadius: 16, border: '4px solid #fde68a', padding: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                            <div style={{ display: 'flex', gap: 10 }}>
                                                {tutP.ans.map((_, idx) => (
                                                    <div key={idx} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                                                        {/* read 타입(3단계 Part 2)일 때만 보이는 작은 숫자 카드 */}
                                                        {tutP.type === 'read' && (
                                                            <div style={{
                                                                width: 36, height: 30, borderRadius: 8,
                                                                background: idx === 0 ? '#a855f7' : '#f97316',
                                                                border: `2px solid ${idx === 0 ? '#9333ea' : '#ea580c'}`,
                                                                color: 'white',
                                                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                                fontSize: 18, fontWeight: 900
                                                            }}>
                                                                {idx === 0 ? Math.floor(tutP.q / 10) : tutP.q % 10}
                                                            </div>
                                                        )}
                                                        <div style={{
                                                            fontSize: 11, fontWeight: 900,
                                                            color: idx === 0 ? '#6b21a8' : '#854d0e',
                                                            background: idx === 0 ? '#f3e8ff' : '#fff7ed',
                                                            padding: '2px 8px', borderRadius: 6,
                                                            border: `1px solid ${idx === 0 ? '#d8b4fe' : '#fed7aa'}`
                                                        }}>{idx === 0 ? '십의 자리' : '일의 자리'}</div>
                                                        <div style={{
                                                            width: 70, height: 70, borderRadius: 14,
                                                            border: `3px dashed ${idx === 0 ? '#d8b4fe' : '#fed7aa'}`,
                                                            background: 'white',
                                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                            fontSize: tutP.type === 'read' ? 18 : 30, fontWeight: 900, color: '#1e293b'
                                                        }}>{drops[idx] || ''}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <button
                                            onClick={onTutorialSubmit}
                                            disabled={drops.includes(null) || drops.length === 0}
                                            style={highlightIf('submit', {
                                                width: 80, padding: '10px 0',
                                                background: (drops.includes(null) || drops.length === 0) ? '#cbd5e1' : '#22c55e',
                                                color: 'white', borderRadius: 12, fontSize: 14, fontWeight: 900,
                                                border: 'none', cursor: (drops.includes(null) || drops.length === 0) ? 'not-allowed' : 'pointer',
                                                fontFamily: 'inherit', alignSelf: 'center'
                                            })}>
                                            정답 ✅
                                        </button>
                                    </>
                                )}
                            </div>

                            {/* 카드 영역 */}
                            <div style={{ textAlign: 'center', fontWeight: 900, color: '#15803d', fontSize: 14 }}>알맞은 카드를 선택하세요!</div>
                            <div style={{ background: '#f0fdf4', borderRadius: 16, border: '3px dashed #bbf7d0', padding: '10px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {tutorial === 1 && (
                                    <>
                                        <div style={{ display: 'flex', gap: 4, justifyContent: 'center', flexWrap: 'wrap' }}>
                                            {S_ORDER.map((c) => (
                                                <button key={`s-${c}`} onClick={() => onTutorialCardClick(c, 0)}
                                                    style={highlightIf(`card-${c}`, {
                                                        background: drops[0] === c ? '#3b82f6' : 'white',
                                                        color: drops[0] === c ? 'white' : '#334155',
                                                        border: `3px solid ${drops[0] === c ? '#2563eb' : '#93c5fd'}`,
                                                        borderRadius: 10, padding: 0,
                                                        width: 56, height: 44,
                                                        fontSize: 18, fontWeight: 900,
                                                        cursor: 'pointer', fontFamily: 'inherit'
                                                    })}>{c}</button>
                                            ))}
                                        </div>
                                        <div style={{ display: 'flex', gap: 4, justifyContent: 'center', flexWrap: 'wrap' }}>
                                            {K_ORDER.map((c) => (
                                                <button key={`k-${c}`} onClick={() => onTutorialCardClick(c, 1)}
                                                    style={highlightIf(`card-${c}`, {
                                                        background: drops[1] === c ? '#ec4899' : 'white',
                                                        color: drops[1] === c ? 'white' : '#334155',
                                                        border: `3px solid ${drops[1] === c ? '#db2777' : '#f9a8d4'}`,
                                                        borderRadius: 10, padding: 0,
                                                        width: 56, height: 44,
                                                        fontSize: 18, fontWeight: 900,
                                                        cursor: 'pointer', fontFamily: 'inherit'
                                                    })}>{c}</button>
                                            ))}
                                        </div>
                                    </>
                                )}

                                {(tutorial === 2 || tutorial === 3) && tutP.type === 'digit' && (
                                    <>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                                            <div style={{ fontSize: 13, fontWeight: 900, color: '#6b21a8', background: '#f3e8ff', padding: '4px 10px', borderRadius: 10, border: '2px solid #d8b4fe', minWidth: 60, textAlign: 'center' }}>십의 자리</div>
                                            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                                                {["1", "2", "3", "4", "5", "6", "7", "8", "9"].map(d => (
                                                    <button key={`t-${d}`} onClick={() => onTutorialCardClick(d, 0, 'tens')}
                                                        style={highlightIf(`card-tens-${d}`, drops[0] !== d ? {
                                                            background: 'white', color: '#334155',
                                                            border: '3px solid #d8b4fe',
                                                            borderRadius: 10, padding: 0,
                                                            width: 40, height: 40,
                                                            fontSize: 18, fontWeight: 900,
                                                            cursor: 'pointer', fontFamily: 'inherit'
                                                        } : {
                                                            background: '#a855f7', color: 'white',
                                                            border: '3px solid #9333ea',
                                                            borderRadius: 10, padding: 0,
                                                            width: 40, height: 40,
                                                            fontSize: 18, fontWeight: 900,
                                                            cursor: 'pointer', fontFamily: 'inherit'
                                                        })}>{d}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                                            <div style={{ fontSize: 13, fontWeight: 900, color: '#854d0e', background: '#fff7ed', padding: '4px 10px', borderRadius: 10, border: '2px solid #fed7aa', minWidth: 60, textAlign: 'center' }}>일의 자리</div>
                                            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                                                {ALL_DIGITS.map(d => (
                                                    <button key={`u-${d}`} onClick={() => onTutorialCardClick(d, 1, 'units')}
                                                        style={highlightIf(`card-units-${d}`, drops[1] !== d ? {
                                                            background: 'white', color: '#334155',
                                                            border: '3px solid #fed7aa',
                                                            borderRadius: 10, padding: 0,
                                                            width: 40, height: 40,
                                                            fontSize: 18, fontWeight: 900,
                                                            cursor: 'pointer', fontFamily: 'inherit'
                                                        } : {
                                                            background: '#f97316', color: 'white',
                                                            border: '3px solid #ea580c',
                                                            borderRadius: 10, padding: 0,
                                                            width: 40, height: 40,
                                                            fontSize: 18, fontWeight: 900,
                                                            cursor: 'pointer', fontFamily: 'inherit'
                                                        })}>{d}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}

                                {/* 3단계 Part 2: 우리말 읽기 카드 */}
                                {tutorial === 3 && tutP.type === 'read' && (
                                    <>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                                            <div style={{ fontSize: 13, fontWeight: 900, color: '#6b21a8', background: '#f3e8ff', padding: '4px 10px', borderRadius: 10, border: '2px solid #d8b4fe', minWidth: 60, textAlign: 'center' }}>십의 자리</div>
                                            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>

                                                        if (spoken && spoken === cleanOpposite) {

                                                                {'학생은 '}<span style={highlightStyle}>{`'${spoken}'`}</span>{'(이)라고 읽었어요.'}<br />
                                                                {'그건 '}<span style={highlightStyle}>{isSino ? '두 번째 방법' : '첫 번째 방법'}</span>{'이에요!'}<br />
                                                                {isSino ? '첫 번째 방법' : '두 번째 방법'}{'으로 다시 읽어볼까요? 🤔'}
                                                            </>;
                                                        }

                                                        // 정답의 각 자리 읽기 (피드백 판정용, 직접 노출하지 않음)
                                                        const tTens = isSino ? (tens === 1 ? '십' : S_ORDER[tens-1] + '십') : K_ORDER[tens-1];
                                                        const tUnits = isSino ? S_UNITS[units] : K_UNITS[units];

                                                        const tensMatch = tTens && spoken.includes(tTens);
                                                        const unitsMatch = tUnits && (units === 0 ? !spoken.match(/[일이삼사오육칠팔구]($|[^십])/) : spoken.includes(tUnits));

                                                        // 케이스 2: 십의 자리만 맞음 → 일의 자리 다른 예시로 힌트
                                                        if (tensMatch && !unitsMatch) {
                                                            return <>
                                                                {spoken && <>{'학생은 '}<span style={highlightStyle}>{`'${spoken}'`}</span>{'(이)라고 읽었어요.'}<br /></>}
                                                                {'십의 자리 '}<span style={highlightStyle}>{`'${tTens}'`}</span>{'은(는) 잘 읽었어요! 👍'}<br />
                                                                {'일의 자리는 어떻게 읽을까요?'}<br />
                                                                <span style={{ fontSize: 28 }}>{'예: '}{unitsExLabel(unitsEx[0])}{', '}{unitsExLabel(unitsEx[1])}</span>
                                                            </>;
                                                        }
                                                        // 케이스 3: 일의 자리만 맞음 → 십의 자리 다른 예시로 힌트
                                                        if (!tensMatch && unitsMatch && tens > 0) {
                                                            return <>
                                                                {spoken && <>{'학생은 '}<span style={highlightStyle}>{`'${spoken}'`}</span>{'(이)라고 읽었어요.'}<br /></>}
                                                                {'일의 자리 '}<span style={highlightStyle}>{`'${tUnits}'`}</span>{'은(는) 잘 읽었어요! 👍'}<br />
                                                                {'십의 자리는 어떻게 읽을까요?'}<br />
                                                                <span style={{ fontSize: 28 }}>{'예: '}{tensExLabel(tensEx[0])}{', '}{tensExLabel(tensEx[1])}</span>
                                                            </>;
                                                        }

                                                        // 케이스 4: 두 가지 방법이 섞인 경우
                                                        const oppTens = isSino ? K_ORDER[tens-1] : (tens === 1 ? '십' : S_ORDER[tens-1] + '십');
                                                        const oppUnits = isSino ? K_UNITS[units] : S_UNITS[units];
                                                        const spokeOppTens = oppTens && spoken.includes(oppTens);
                                                        const spokeOppUnits = oppUnits && spoken.includes(oppUnits);

                                                        if (spokeOppTens || spokeOppUnits) {
                                                            return <>
                                                                {spoken && <>{'학생은 '}<span style={highlightStyle}>{`'${spoken}'`}</span>{'(이)라고 읽었어요.'}<br /></>}
                                                                {'두 가지 방법이 섞였네요. 😅'}<br />
                                                                <span style={{ fontSize: 28 }}>
                                                                    {isSino
                                                                        ? <>{'한 가지 방법으로만 읽어볼까요?'}<br />{'예: '}{tensExLabel(tensEx[0])}{', '}{unitsExLabel(unitsEx[0])}</>
                                                                        : <>{'한 가지 방법으로만 읽어볼까요?'}<br />{'예: '}{tensExLabel(tensEx[0])}{', '}{unitsExLabel(unitsEx[0])}</>
                                                                    }
                                                                </span>
                                                            </>;
                                                        }

                                                        // 케이스 5: 그 외 (인식 실패 또는 전혀 다른 읽기)
                                                        return <>
                                                            {spoken
                                                                ? <>{'학생은 '}<span style={highlightStyle}>{`'${spoken}'`}</span>{'(이)라고 읽었어요.'}<br /></>
                                                                : <>{'잘 들리지 않았어요. 😅'}<br /></>
                                                            }
                                                            {'천천히 다시 읽어볼까요?'}<br />
                                                            <span style={{ fontSize: 28 }}>
                                                                {'예: '}{tensExLabel(tensEx[0])}{', '}{unitsExLabel(unitsEx[0])}
                                                            </span>
                                                        </>;
                                                    })()}
                                                </span>
                                            </span>
                                        )}
                                    </div>

                                    {/* 버튼 */}
                                    <div style={{ display: 'flex', gap: 16, width: '100%' }}>
                                        {voiceResult === 'wrong' && (
                                            <button onClick={() => {
                                                if (!reviewMode && !wrong.find(w => w.id === p.id)) {
                                                    setWrong(pr => [...pr, p]);
                                                }
                                                setTranscript('');
                                                setVoiceResult(null);
                                            }} className="main-btn" style={{ flex: 1, padding: '20px', background: '#f97316', color: 'white', borderRadius: 24, fontSize: 28, fontWeight: 900, border: 'none', cursor: 'pointer', boxShadow: '0 8px 20px rgba(249,115,22,0.3)' }}>
                                                🔄 다시 해보기
                                            </button>
                                        )}
                                        {voiceResult === 'correct' && voiceStep === 'sino' && (
                                            <button onClick={() => {
                                                setTranscript('');
                                                setVoiceResult(null);
                                                setVoiceStep('native');
                                            }} className="main-btn" style={{ flex: 1, padding: '20px', background: '#3b82f6', color: 'white', borderRadius: 24, fontSize: 28, fontWeight: 900, border: 'none', cursor: 'pointer', boxShadow: '0 8px 20px rgba(59,130,246,0.3)' }}>
                                                다르게 읽기 ▶
                                            </button>
                                        )}
                                        {voiceResult === 'correct' && voiceStep === 'native' && (
                                            <button onClick={nextVoice} className="main-btn" style={{ flex: 1, padding: '20px', background: '#22c55e', color: 'white', borderRadius: 24, fontSize: 28, fontWeight: 900, border: 'none', cursor: 'pointer', boxShadow: '0 8px 20px rgba(34,197,94,0.3)' }}>

                    {/* 완료 스탬프 오버레이 */}
                    {stamp && (

                            <div className="stamp-in" style={{ background: 'white', padding: '48px 64px', borderRadius: 64, boxShadow: '0 40px 100px rgba(0,0,0,0.2)', border: '12px solid #a7f3d0', textAlign: 'center', maxWidth: 700, width: '90%' }}>
                                <div style={{ fontSize: 80, marginBottom: 12 }}>🎙️</div>

                                        <div style={{ width: 4, height: 60, background: '#bbf7d0', borderRadius: 2 }} />

                                            <div style={{ fontSize: 20, color: '#64748b', fontWeight: 700, marginBottom: 8 }}>한 번에 읽기</div>
                                            <div style={{ fontSize: 52, fontWeight: 900, color: '#2563eb', lineHeight: 1 }}>{problems.length - (wrong.length)}<span style={{ fontSize: 24 }}>개</span></div>
                                        </div>
                                    </div>
                                    <div style={{ marginTop: 24, fontSize: 24, color: '#166534', fontWeight: 900 }}>

                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: 16 }}>
                                    {wrong.length > 0 && (

                                            🔄 다시 읽어보기
                                        </button>
                                    )}
                                    <button className="confirm-btn" 
                                        disabled={wrong.length > 0}
                                        onClick={() => { setStep('map'); setStamp(false); }}

                                            flex: 1, padding: '18px', 
                                            background: wrong.length > 0 ? '#cbd5e1' : '#22c55e', 
                                            color: 'white', borderRadius: 24, fontSize: 24, fontWeight: 900, border: 'none', 
                                            cursor: wrong.length > 0 ? 'not-allowed' : 'pointer', 
                                            boxShadow: wrong.length > 0 ? 'none' : '0 8px 24px rgba(34,197,94,0.4)',

                                        }}>
                                        지도로 돌아가기 🗺️
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 튜토리얼 모달 */}
                    {renderTutorial()}
                </div>

            /* ── PLAY (1~3단계: 카드 선택) ── */
            if (step === 'play' && p) return (

                        <div style={{ fontSize: 22, fontWeight: 900, color: '#166534', whiteSpace: 'nowrap', background: 'white', padding: '6px 16px', borderRadius: 12, border: '2px solid #bbf7d0' }}>

                                <span>{probIdx + 1} / {problems.length}</span>
                            </div>
                            <div style={{ height: 10, background: '#dcfce7', borderRadius: 999, overflow: 'hidden' }}>
                                <div className="progress-bar" style={{ height: '100%', background: reviewMode ? '#fb923c' : '#4ade80', borderRadius: 999, width: `${((probIdx + 1) / problems.length) * 100}%` }} />
                            </div>
                        </div>
                        <div style={{ fontSize: 18, fontWeight: 900, color: '#166534', background: 'white', padding: '6px 14px', borderRadius: 12, border: '2px solid #bbf7d0', display: 'flex', alignItems: 'center', gap: 6 }}>
                            <span>👤</span>
                            <span>{currentUser?.name}</span>
                        </div>
                        <button onClick={() => setMuted(!muted)}
                            style={{ fontSize: 22, background: 'none', border: 'none', cursor: 'pointer' }}>{muted ? '🔇' : '🔊'}</button>
                    </div>

                    <div style={{ padding: '8px 12px', display: 'flex', alignItems: 'stretch', justifyContent: 'center', flexShrink: 0, height: 340, gap: 16 }}>
                        {/* 문제 표시 */}
                        <div style={{ flex: 1, background: '#f0fdf4', border: '6px solid #4ade80', borderRadius: 60, padding: '24px 40px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', position: 'relative', boxShadow: '0 10px 30px rgba(0,0,0,0.05)' }}>
                            {phase === 3 || p.type === 'bundle' ? (
                                <BlocksDisplay value={p.q} />
                            ) : (
                                <div style={{ fontSize: phase === 2 ? 180 : 200, fontWeight: 900, color: '#2563eb', lineHeight: 1 }}>
                                    {p.q}
                                </div>
                            )}
                        </div>

                        {/* 2, 3단계 전용 정답란 & 버튼 (옆으로 이동) */}
                        {(phase === 2 || phase === 3) && (
                            <>
                                <div style={{ width: 360, display: 'flex', flexDirection: 'column' }}>
                                    <div style={{ background: 'white', borderRadius: 32, border: '6px solid #fde68a', padding: '16px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', boxShadow: '0 10px 30px rgba(0,0,0,0.05)', flex: 1 }}>
                                        <div style={{ display: 'flex', flexDirection: 'row', gap: 20 }}>
                                            {p.ans.map((_, idx) => (
                                                <div key={idx} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>

                                                        <div style={{
                                                            width: 60, height: 50, borderRadius: 12,
                                                            background: idx === 0 ? '#a855f7' : '#f97316',
                                                            border: `4px solid ${idx === 0 ? '#9333ea' : '#ea580c'}`,
                                                            color: 'white',
                                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                            fontSize: 32, fontWeight: 900,
                                                            marginBottom: 4,
                                                        }}>
                                                            {idx === 0 ? Math.floor(p.q / 10) : p.q % 10}
                                                        </div>
                                                    )}
                                                    <div style={{
                                                        fontSize: 16, fontWeight: 900,
                                                        color: idx === 0 ? '#6b21a8' : '#854d0e',
                                                        background: idx === 0 ? '#f3e8ff' : '#fff7ed',
                                                        padding: '2px 10px', borderRadius: 8,
                                                        border: `1px solid ${idx === 0 ? '#d8b4fe' : '#fed7aa'}`,

                                                        {idx === 0 ? '십의 자리' : '일의 자리'}
                                                    </div>
                                                    <button
                                                        onClick={() => clearDrop(idx)}
                                                        style={{
                                                            width: 110, height: 100, borderRadius: 20,
                                                            border: `4px dashed ${idx === 0 ? '#d8b4fe' : '#fed7aa'}`,
                                                            background: 'white',
                                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                            fontSize: 60, fontWeight: 900,
                                                            color: '#1e293b',
                                                            boxShadow: 'inset 0 4px 10px rgba(0,0,0,0.05)',
                                                            cursor: drops[idx] ? 'pointer' : 'default',

                                        </div>

                                    <div style={{ display: 'flex', flexDirection: 'row', gap: 8 }}>
                                        <button
                                            onClick={() => setDrops(new Array(p.ans.length).fill(null))}
                                            className="main-btn"
                                            style={{ flex: 1, padding: '12px 0', background: '#e11d48', color: 'white', borderRadius: 16, fontSize: 18, fontWeight: 900, border: 'none', cursor: 'pointer' }}>

                                <div style={{ flex: 1, background: '#f0fdf4', borderRadius: 32, border: '4px dashed #bbf7d0', padding: '12px 20px', display: 'flex', flexDirection: 'column', gap: 12, position: 'relative', justifyContent: 'center', alignItems: 'center', minHeight: 0 }}>
                                <div className="card-scroll" style={{ display: 'flex', flexDirection: 'column', gap: 16, alignItems: 'center', overflow: 'hidden', width: '100%' }}>
                                    {p.type === 'read' ? (

                                            {/* 십의 자리 카드 */}
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                                                <div style={{
                                                    fontSize: 24, fontWeight: 900,
                                                    color: '#6b21a8', background: '#f3e8ff',
                                                    padding: '8px 20px', borderRadius: 16,
                                                    border: '3px solid #d8b4fe',
                                                    whiteSpace: 'nowrap', width: 130, textAlign: 'center'
                                                }}>십의 자리</div>
                                                <div style={{ display: 'flex', flexWrap: 'nowrap', gap: 10, justifyContent: 'center' }}>
                                                    {K_ORDER.map((c, i) => (
                                                        <SelectionCard key={`ro-${c}-${i}`} value={c} onClick={() => handleCardClick(c, 0)} colorScheme="purple" small selected={drops[0] === c} />

                                                <div style={{ display: 'flex', flexWrap: 'nowrap', gap: 10, justifyContent: 'center' }}>
                                                    {K_UNITS.filter(u => u !== "").map((c, i) => (

                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : p.type === 'bundle' ? (
